name = "gokkan-keeper-api"
main = "src/index.ts"
compatibility_date = "2024-01-15"

# D1 database binding (for migrations - uses production database_id)
# Note: wrangler dev will use local SQLite file automatically
[[d1_databases]]
binding = "DB"
database_name = "shared-db"
database_id = "894124e2-8236-4647-a3a0-bc8674865889"
migrations_dir = "../../migrations"

# Production environment
[env.production]
# 커스텀 도메인을 사용하려면 아래 주석을 해제하고 Cloudflare에 도메인을 설정하세요
# routes = [
#   { pattern = "api.gokkan-keeper.com", zone_name = "gokkan-keeper.com" }
# ]

[[env.production.d1_databases]]
binding = "DB"
database_name = "shared-db"
database_id = "894124e2-8236-4647-a3a0-bc8674865889"
migrations_dir = "../../migrations"

[env.production.vars]
NODE_ENV = "production"
FSC_STOCK_API_BASE_URL = "https://apis.data.go.kr/1160100/service/GetStockSecuritiesInfoService"
FSC_SECURITIES_PRODUCT_API_BASE_URL = "https://apis.data.go.kr/1160100/service/GetSecuritiesProductInfoService"
